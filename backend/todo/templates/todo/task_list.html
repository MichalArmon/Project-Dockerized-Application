<!DOCTYPE html>
<html>

<head>
  <title>Dockerized Django App</title>
</head>

<body>
  <h1>Dockerized Django To-Do App</h1>

  <form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Enter a new task">
    <button type="submit">Add Task</button>
  </form>

  <h2>Tasks:</h2>

  <ul>
    {% for task in tasks %}
    <li>{{ task.title }} — {{ task.created_at }}</li>
    {% empty %}
    <li>No tasks yet.</li>
    {% endfor %}
  </ul>
</body>

</html>
